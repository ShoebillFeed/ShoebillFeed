name: Build and publish Docker images

# Requires two repository secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  Docker Hub username -- also used as the image namespace,
#                       so images publish to docker.io/<DOCKERHUB_USERNAME>/shoebill-backend
#                       and .../shoebill-frontend. Rename the `images:` line below
#                       if you'd rather publish under a different org/namespace.
#   DOCKERHUB_TOKEN     A Docker Hub access token (Account Settings -> Security),
#                       not your account password.
#
# Until those secrets exist, this workflow will run and fail at the login step --
# harmless, nothing publishes until they're added.

on:
  push:
    branches: [main]
    tags:
      # GitHub Actions tag filters are glob patterns, not regex -- `+` is not
      # a quantifier here. `*.*.*` is the standard idiom for "three
      # dot-separated segments" and matches this repo's existing tags
      # (0.1.0 .. 0.1.4) correctly.
      - "*.*.*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: shoebill-backend
            context: backend
          - image: shoebill-frontend
            context: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
