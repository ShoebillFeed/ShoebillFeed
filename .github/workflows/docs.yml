name: Build and deploy docs

# One-time setup required: Settings -> Pages -> Source -> "GitHub Actions".
# No repo secrets needed -- GitHub Pages deployment via actions/deploy-pages
# uses the workflow's own OIDC token (permissions below), not a PAT.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: docs/requirements.txt

      - name: Install Sphinx
        run: pip install -r docs/requirements.txt

      - name: Build docs
        # -W: broken toctree refs / bad MyST syntax fail the build instead of
        # silently publishing broken navigation. --keep-going: report every
        # warning in one pass rather than stopping at the first.
        run: sphinx-build -b html docs docs/_build/html -W --keep-going

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
