services:

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phoenix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-phoenix}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phoenix}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [shoebill_internal]
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [shoebill_internal]
    restart: unless-stopped

#  ollama:
#    image: ollama/ollama
#    command: serve
#    environment:
#      OLLAMA_KEEP_ALIVE: "-1"
#    volumes:
#      - ./data/ollama:/root/.ollama
#    healthcheck:
#      test: ["CMD", "ollama", "list"]
#      interval: 10s
#      timeout: 5s
#      retries: 5
#      start_period: 10s
#    networks: [shoebill_internal]
#    restart: unless-stopped

  ollama-init:
    image: ollama/ollama
    command: sh -c "ollama pull ${OLLAMA_MODEL:-qwen3:8b} && ollama pull ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}"
    environment:
      OLLAMA_HOST: ${OLLAMA_BASE_URL:-http://ollama:11434}
    networks: [shoebill_internal]
    restart: on-failure

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "alembic upgrade head && gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/settings/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-phoenix}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-phoenix}
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDERS: ${LLM_PROVIDERS:-${LLM_PROVIDER:-ollama}}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-ShoebillFeed/1.0}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
#      ollama:
#        condition: service_healthy
    networks: [shoebill_internal]
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 -Q fetch,default
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-phoenix}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-phoenix}
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDERS: ${LLM_PROVIDERS:-${LLM_PROVIDER:-ollama}}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-ShoebillFeed/1.0}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
#      ollama:
#        condition: service_healthy
    networks: [shoebill_internal]
    restart: unless-stopped

  celery-worker-process:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Dedicated single-concurrency worker for the `process` queue: Ollama serializes
    # LLM calls on one GPU, so concurrency>1 here just causes FIFO queue spikes
    # (one Celery task waiting behind 3 others' LLM calls) without any throughput gain.
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=1 -Q process
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-phoenix}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-phoenix}
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDERS: ${LLM_PROVIDERS:-${LLM_PROVIDER:-ollama}}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-ShoebillFeed/1.0}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
#      ollama:
#        condition: service_healthy
    networks: [shoebill_internal]
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler --schedule /var/lib/celerybeat/celerybeat-schedule
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-phoenix}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-phoenix}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data/celerybeat:/var/lib/celerybeat
    depends_on:
      redis:
        condition: service_healthy
    networks: [shoebill_internal]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks: [shoebill_internal, shoebill]
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.shoebill.rule=Host(`shoebill.s-hoose.de`)"
      - "traefik.http.routers.shoebill.entrypoints=web"
      - "traefik.http.routers.shoebill-secure.rule=Host(`shoebill.s-hoose.de`)"
      - "traefik.http.routers.shoebill-secure.entrypoints=web-secure"
      - "traefik.http.routers.shoebill-secure.tls=true"
      - "traefik.http.routers.shoebill-secure.tls.certresolver=letsencrypt"

networks:
  shoebill_internal:
    driver: bridge
  shoebill:
    external: true

